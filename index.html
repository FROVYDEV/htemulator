<!DOCTYPE html>
<html>

<head>

<title>htemulator</title>

<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>


<body>


<!-- LOGIN SCREEN -->

<div id="login">

<h1>htemulator</h1>

<h2>Login</h2>


<button id="googleLogin">
Sign in with Google
</button>


<p id="loginMessage"></p>


</div>





<!-- GAME LAUNCHER -->

<div id="launcher">


<header>

<h1>htemulator</h1>


<input 
id="search"
placeholder="Search games..."
>


</header>



<h2>Game Library</h2>


<div id="games">

Loading games...

</div>


</div>






<!-- GAME PLAYER -->

<div id="player">


<button onclick="closeGame()">

← Back

</button>



<h2 id="gameTitle"></h2>



<iframe 
id="gameFrame"
allowfullscreen>
</iframe>



</div>





<script src="script.js"></script>



<!-- FIREBASE GOOGLE LOGIN -->

<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {

getAuth,

GoogleAuthProvider,

signInWithPopup,

onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";





const firebaseConfig = {

apiKey: "AIzaSyCsXrTr4G992g9b-q9g7IoXTCgSPjkuIls",

authDomain: "htemulator-592b8.firebaseapp.com",

projectId: "htemulator-592b8",

storageBucket: "htemulator-592b8.firebasestorage.app",

messagingSenderId: "530564298763",

appId: "1:530564298763:web:8b1bd4c4662fb25141ef0e",

measurementId: "G-5EYLCKLR91"

};





const app = initializeApp(firebaseConfig);


const auth = getAuth(app);


const provider = new GoogleAuthProvider();





document
.getElementById("googleLogin")
.onclick = async function(){


try {


await signInWithPopup(
auth,
provider
);


showLauncher();


}


catch(error){


console.error(error);


document
.getElementById("loginMessage")
.innerText =
error.message;


}


};







onAuthStateChanged(auth,(user)=>{


if(user){


showLauncher();


}


});







function showLauncher(){


document
.getElementById("login")
.style.display="none";


document
.getElementById("launcher")
.style.display="block";


}



</script>


</body>

</html>
