<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";



const firebaseConfig = {

apiKey: "AIzaSyCsXrTr4G992g9b-q9g7IoXTCgSPjkuIls",

authDomain: "htemulator-592b8.firebaseapp.com",

projectId: "htemulator-592b8",

storageBucket: "htemulator-592b8.firebasestorage.app",

messagingSenderId: "530564298763",

appId: "1:530564298763:web:8b1bd4c4662fb25141ef0e",

measurementId: "G-5EYLCKLR91"

};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();



const whitelist = [

"pandaporg359@gmail.com",

"anti.s.creator@gmail.com"

];





function showLauncher(){

const login = document.getElementById("login");

const launcher = document.getElementById("launcher");


if(login){

login.style.display = "none";

}


if(launcher){

launcher.style.display = "block";

}

}





const googleLogin = document.getElementById("googleLogin");


if(googleLogin){


googleLogin.onclick = async function(){


try{


const result = await signInWithPopup(
auth,
provider
);


const user = result.user;



if(whitelist.includes(user.email)){


showLauncher();


}

else{


const message = document.getElementById("loginMessage");


if(message){

message.innerText =
"Your Google account is not whitelisted.";

}


await signOut(auth);


}


}


catch(error){


console.error(error);


const message = document.getElementById("loginMessage");


if(message){

message.innerText = error.message;

}


}


};


}







onAuthStateChanged(auth,(user)=>{


if(user){


if(whitelist.includes(user.email)){


showLauncher();


}

else{


signOut(auth);


}


}


});


</script>
