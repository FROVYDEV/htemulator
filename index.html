<!DOCTYPE html>
<html>

<head>

<title>htemulator</title>

<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>


<body>


<div id="launcher">


<header>

<h1>htemulator</h1>

<input 
id="search"
type="text"
placeholder="Search games..."
oninput="searchGames()"
>

</header>



<section id="library">

<h2>Game Library</h2>


<div id="games">

<div class="loading">
Loading games...
</div>

</div>


</section>


</div>





<div id="player">


<button id="backButton" onclick="closeGame()">

← Back

</button>



<h2 id="gameTitle">

</h2>



<div id="gameContainer">

<iframe 
id="gameFrame"
allowfullscreen>
</iframe>

</div>


</div>




<div id="loadingScreen">

Loading HTEmulator...

</div>




<script src="script.js"></script>


</body>

</html>
