<!DOCTYPE html>
<html>

<head>

<title>htemulator</title>

<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>


<body>


<!-- LOGIN SCREEN -->

<div id="login">

<h1>htemulator</h1>

<h2>Login</h2>


<input 
id="username"
placeholder="Username"
>


<input 
id="password"
type="password"
placeholder="Password"
>


<button onclick="login()">
Login
</button>


<p id="loginMessage"></p>


</div>





<!-- GAME LAUNCHER -->

<div id="launcher">


<header>

<h1>htemulator</h1>


<input 
id="search"
placeholder="Search games..."
>


</header>



<h2>Game Library</h2>


<div id="games">

Loading games...

</div>


</div>






<!-- GAME PLAYER -->

<div id="player">


<button onclick="closeGame()">

← Back

</button>



<h2 id="gameTitle"></h2>



<iframe 
id="gameFrame"
allowfullscreen>
</iframe>



</div>




<script src="script.js"></script>


</body>

</html>
