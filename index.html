<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTEmulator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="launcher">

        <h1>HTEmulator</h1>

        <input 
            type="text" 
            id="search" 
            placeholder="Search games..."
        >

        <div id="games">
            <!-- Games load here -->
        </div>

    </div>


    <div id="player" style="display:none;">

        <h2 id="gameTitle"></h2>

        <iframe 
            id="gameFrame"
            frameborder="0"
            allowfullscreen>
        </iframe>

        <button onclick="showLauncher()">
            Back
        </button>

    </div>


    <script src="script.js"></script>

</body>
</html>
